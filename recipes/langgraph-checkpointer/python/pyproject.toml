[project]
name = "langgraph-checkpointer-py"
version = "0.0.1"
requires-python = ">=3.11"
dependencies = [
    "langgraph >= 1, < 2",
    "langgraph-checkpoint-persql >= 0.1",
    "persql >= 0.4",
    "python-dotenv >= 1.0",
]

# Only the interactive agent (main.py) needs an LLM client. CI runs ci.py,
# which exercises the checkpointer without a model, so this stays out of the
# default install: `uv sync --extra interactive` to run main.py.
[project.optional-dependencies]
interactive = ["langchain-openai >= 0.3"]

[tool.uv]
package = false
