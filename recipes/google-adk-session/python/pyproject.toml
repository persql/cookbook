[project]
name = "google-adk-session-py"
version = "0.0.1"
requires-python = ">=3.11"
dependencies = [
    "google-adk-persql >= 0.1",
    "persql >= 0.4",
    "python-dotenv >= 1.0",
]

# Only the interactive agent (main.py) needs an LLM. ADK reaches a custom
# OpenAI-compatible gateway through LiteLlm. CI runs ci.py, which exercises the
# session service directly, so this stays out of the default install:
# `uv sync --extra interactive` to run main.py.
[project.optional-dependencies]
interactive = ["litellm >= 1.0"]

[tool.uv]
package = false
