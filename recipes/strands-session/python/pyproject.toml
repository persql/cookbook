[project]
name = "strands-session-py"
version = "0.0.1"
requires-python = ">=3.11"
dependencies = [
    "strands-persql >= 0.1",
    "persql >= 0.4",
    "python-dotenv >= 1.0",
]

# Only the interactive agent (main.py) needs a model provider. CI runs ci.py,
# which exercises the session repository directly, so this stays out of the
# default install: `uv sync --extra interactive` to run main.py.
[project.optional-dependencies]
interactive = ["strands-agents[openai] >= 1.42"]

[tool.uv]
package = false
