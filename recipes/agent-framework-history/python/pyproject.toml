[project]
name = "agent-framework-history-py"
version = "0.0.1"
requires-python = ">=3.11"
dependencies = [
    "agent-framework-persql >= 0.1",
    "persql >= 0.4",
    "python-dotenv >= 1.0",
]

# The headless ci.py needs only the adapter (which pulls agent-framework-core).
# The interactive main.py additionally needs the framework's OpenAI chat client
# from the `agent-framework` meta package — install it directly to run main.py:
#   uv pip install agent-framework
# It is intentionally NOT an optional-dependency here: `uv sync` resolves every
# extra for its universal lock, and the meta package currently has an
# unresolvable transitive pin (agent-framework-azure-ai-search ->
# azure-search-documents), which would break the headless run too.

[tool.uv]
package = false
