[project]
name = "agent-framework-history-py"
version = "0.0.1"
requires-python = ">=3.11"
dependencies = [
    "agent-framework-persql >= 0.1",
    "persql >= 0.4",
    "python-dotenv >= 1.0",
]

# Only the interactive agent (main.py) needs the full framework + an LLM client.
# CI runs ci.py, which exercises the history provider directly, so this stays
# out of the default install: `uv sync --extra interactive` to run main.py.
[project.optional-dependencies]
interactive = ["agent-framework >= 1.8"]

[tool.uv]
package = false
