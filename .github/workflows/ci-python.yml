name: CI — Python

on:
  push:
    paths:
      - "recipes/*/python/**"
      - ".github/workflows/ci-python.yml"
  pull_request:
    paths:
      - "recipes/*/python/**"
      - ".github/workflows/ci-python.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for persql/setup-db OIDC
      contents: read
    strategy:
      matrix:
        recipe:
          - agent-memory
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - run: uv sync
        working-directory: recipes/${{ matrix.recipe }}/python

      # Provision a repo-scoped PerSQL database via OIDC (no secret needed).
      # Each run claims a fresh branch for isolation and deletes it on exit.
      # Requires the PerSQL GitHub App to be installed on this repo.
      - uses: persql/setup-db@v1
        id: persql
        continue-on-error: true   # fall back to local mode if App not installed

      # Run headless CI script.
      # Local mode  (App not installed): in-process SQLite, no network, no cost.
      # Remote mode (App installed):     claims a branch per run, tests, cleans up.
      - run: uv run python ci.py
        working-directory: recipes/${{ matrix.recipe }}/python
        env:
          PERSQL_TOKEN: ${{ steps.persql.outputs.token }}
          PERSQL_DATABASE: ${{ steps.persql.outputs.namespace }}/${{ steps.persql.outputs.database }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
