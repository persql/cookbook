name: CI — Python

on:
  push:
    paths:
      - "recipes/*/python/**"
      - ".github/workflows/ci-python.yml"
  pull_request:
    paths:
      - "recipes/*/python/**"
      - ".github/workflows/ci-python.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        recipe:
          - agent-memory
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - run: uv sync
        working-directory: recipes/${{ matrix.recipe }}/python

      # Run headless CI script.
      # Local mode (no PERSQL_TOKEN): in-process SQLite, no network, no cost.
      # Remote mode (secret set):     hits real PerSQL + OpenAI APIs.
      - run: uv run python ci.py
        working-directory: recipes/${{ matrix.recipe }}/python
        env:
          PERSQL_TOKEN: ${{ secrets.PERSQL_TOKEN }}
          PERSQL_DATABASE: ${{ secrets.PERSQL_DATABASE || 'cookbook/agent-memory-ci' }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
