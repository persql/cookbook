name: CI — TypeScript

on:
  push:
    paths:
      - "recipes/*/typescript/**"
      - ".github/workflows/ci-typescript.yml"
  pull_request:
    paths:
      - "recipes/*/typescript/**"
      - ".github/workflows/ci-typescript.yml"
  # Fired by the persql monorepo after a deploy/publish completes, so the
  # recipes are re-tested against the freshly shipped SDK + live API.
  repository_dispatch:
    types: [persql-updated]
  workflow_dispatch:

# A newer trigger (e.g. a fresh SDK publish) cancels a queued/running stale
# run — only the latest published state is worth testing.
concurrency:
  group: ci-typescript-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for persql/setup-db OIDC
      contents: read
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - agent-memory
          - langgraph-checkpointer
          - openai-agents-session
          - drizzle
          - kysely
          - prisma
          - context
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install
        working-directory: recipes/${{ matrix.recipe }}/typescript

      # Type-check always.
      - run: npx tsc --noEmit
        working-directory: recipes/${{ matrix.recipe }}/typescript

      # Provision a repo-scoped PerSQL database via OIDC (no secret needed).
      # Each run claims a fresh branch for isolation and deletes it on exit.
      # Requires the PerSQL GitHub App to be installed on this repo.
      - uses: persql/setup-db@v1
        id: persql
        continue-on-error: true   # fall back to local mode if App not installed

      # Run headless CI script.
      # Local mode  (App not installed): in-process SQLite, no network, no cost.
      # Remote mode (App installed):     claims a branch per run, tests, cleans up.
      - run: npx tsx ci.ts
        working-directory: recipes/${{ matrix.recipe }}/typescript
        env:
          PERSQL_TOKEN: ${{ steps.persql.outputs.token }}
          PERSQL_DATABASE: ${{ steps.persql.outputs.namespace }}/${{ steps.persql.outputs.database }}
          # Unique per matrix job: every recipe shares one run_id, so the
          # branch ref must include the recipe or they collide on one DB.
          PERSQL_BRANCH_REF: ci-${{ github.run_id }}-${{ matrix.recipe }}-ts
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
