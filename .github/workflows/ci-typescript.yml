name: CI — TypeScript

on:
  push:
    paths:
      - "recipes/*/typescript/**"
      - ".github/workflows/ci-typescript.yml"
  pull_request:
    paths:
      - "recipes/*/typescript/**"
      - ".github/workflows/ci-typescript.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        recipe:
          - agent-memory
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install
        working-directory: recipes/${{ matrix.recipe }}/typescript

      # Type-check always.
      - run: npx tsc --noEmit
        working-directory: recipes/${{ matrix.recipe }}/typescript

      # Run headless CI script.
      # Local mode (no PERSQL_TOKEN): in-process SQLite, no network, no cost.
      # Remote mode (secret set):     hits real PerSQL + OpenAI APIs.
      - run: npx tsx ci.ts
        working-directory: recipes/${{ matrix.recipe }}/typescript
        env:
          PERSQL_TOKEN: ${{ secrets.PERSQL_TOKEN }}
          PERSQL_DATABASE: ${{ secrets.PERSQL_DATABASE || 'cookbook/agent-memory-ci' }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
